<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2XTR Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Animation Library -->
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary-blue: #1E55ED;
            --bg-dark: #0a0a0a;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* NAVIGATION BAR - Exact Match to Reference */
        .nav-container {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .nav-links-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
        }

        .nav-item {
            font-size: 14px;
            font-weight: 500;
            color: #888; /* Muted gray from image */
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #fff;
        }

        .dashboard-btn {
            margin-left: auto;
            background-color: var(--primary-blue);
            padding: 8px 24px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(30, 85, 237, 0.3);
        }

        .dashboard-btn:hover {
            filter: brightness(1.2);
            transform: translateY(-1px);
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
        }

        /* PRODUCTS SECTION */
        .products-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 100px 20px;
            flex-wrap: wrap;
        }

        .glass-card {
            width: 280px;
            height: 400px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .glass-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-blue);
            background: rgba(255, 255, 255, 0.06);
        }

        .card-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(100%) hue-rotate(190deg) saturate(300%) brightness(0.7);
            opacity: 0.6;
            transition: 0.5s;
        }

        .glass-card:hover .card-img {
            opacity: 0.9;
            transform: scale(1.05);
        }

        .card-title {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 14px;
            z-index: 2;
        }

        /* LOGIN VIEW */
        #login-view {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg-dark);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 380px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
        }

        .input-field {
            width: 100%;
            background: #151515;
            border: 1px solid #222;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            color: white;
            outline: none;
        }

        .input-field:focus { border-color: var(--primary-blue); }
    </style>
</head>
<body>

    <!-- NAV BAR -->
    <header class="nav-container">
        <img src="https://i.postimg.cc/mrryXznV/IMG-0723.png" alt="2XTR" class="h-10">
        
        <div class="nav-links-center">
            <a href="#" class="nav-item">Home</a>
            <a href="https://discord.gg/vn5AytvDfa" target="_blank" class="nav-item">Showcase</a>
            <a href="#features" class="nav-item">Features</a>
            <a href="#products" class="nav-item">Products</a>
        </div>

        <button onclick="toggleLogin(true)" class="dashboard-btn">Dashboard</button>
    </header>

    <!-- HERO -->
    <section class="hero" data-aos="fade-up">
        <h1><span style="color:var(--primary-blue)">2XTR</span> is not just a store<br>but also a community</h1>
        <p style="color:#555; font-size: 18px;">Still, don't miss your chance to purchase our products.</p>
    </section>

    <!-- PRODUCTS SECTION -->
    <div id="products" class="text-center">
        <h2 data-aos="fade-up" style="font-size: 48px; font-weight: 800;">Our <span style="color:var(--primary-blue)">Premium</span> Products</h2>
        <p style="color:#444">Guarantee your edge in the game now</p>
        
        <div class="products-grid">
            <a href="https://discord.gg/vn5AytvDfa" target="_blank" class="glass-card" data-aos="fade-up" data-aos-delay="100">
                <img src="https://i.postimg.cc/Fsg6wSTM/garena-free-fire-female-character-with-rifle-gun-cj9ljr7stkelt6gn.webp" class="card-img">
                <div class="card-title">Free Fire External</div>
            </a>
            <a href="https://discord.gg/vn5AytvDfa" target="_blank" class="glass-card" data-aos="fade-up" data-aos-delay="200">
                <img src="https://i.postimg.cc/Mpp94FML/1869022-3840x2160-desktop-4k-valorant-wallpaper-photo.webp" class="card-img">
                <div class="card-title">Aim Color Valorant</div>
            </a>
            <a href="https://discord.gg/vn5AytvDfa" target="_blank" class="glass-card" data-aos="fade-up" data-aos-delay="300">
                <img src="https://i.postimg.cc/SsYSGdfW/5a660febec3a03937a7603715c0b2157.webp" class="card-img">
                <div class="card-title">FiveM External</div>
            </a>
        </div>
    </div>

    <!-- LOGIN PAGE -->
    <div id="login-view">
        <div class="login-box">
            <img src="https://i.postimg.cc/mrryXznV/IMG-0723.png" class="h-16 mx-auto mb-8">
            <input type="text" placeholder="Username" class="input-field">
            <input type="password" placeholder="Password" class="input-field">
            <button class="dashboard-btn w-full py-4 mt-4 text-sm">Login Now</button>
            <button onclick="toggleLogin(false)" style="margin-top:20px; color:#444; font-size: 12px; text-transform: uppercase;">Back to home</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
        function toggleLogin(show) {
            document.getElementById('login-view').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
